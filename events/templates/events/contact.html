{% extends 'events/show.html' %}

{% block content %}

<h2>Contact Us</h2>

{% if success %}
<p style="color: green; font-weight: bold;">
    {{ success }}
</p>
{% endif %}

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Send Message</button>
</form>

{% endblock %}
